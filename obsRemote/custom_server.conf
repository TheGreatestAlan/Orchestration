# HTTP server for ACME challenges and redirects
server {
    listen 80;
    server_name alanhoangnguyen.com www.alanhoangnguyen.com openwebui.alanhoangnguyen.com helper.alanhoangnguyen.com n8n.alanhoangnguyen.com registry.alanhoangnguyen.com vault.alanhoangnguyen.com auth.alanhoangnguyen.com;

    # ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Dedicated HTTP server for flofluent.com
server {
    listen 80;
    server_name flofluent.com www.flofluent.com;

    # ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

