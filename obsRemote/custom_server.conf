    # MCP Streamable HTTP Endpoint (current MCP transport)
    # Single endpoint for all MCP communication - OAuth protected via jwt-validator
    location = /mcp {
        auth_basic off;

        proxy_pass http://jwt-validator:9000/mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;

        # Long timeout for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;

        # CORS headers for browser-based MCP clients
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Mcp-Session-Id" always;
        add_header Access-Control-Expose-Headers "Mcp-Session-Id" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

