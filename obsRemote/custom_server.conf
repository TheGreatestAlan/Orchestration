# n8n Workflow Automation
server {
    listen 443 ssl http2;
    server_name n8n.alanhoangnguyen.com;

    # SSL Configuration (using main cert which includes n8n.alanhoangnguyen.com as SAN)
    ssl_certificate /etc/letsencrypt/live/alanhoangnguyen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alanhoangnguyen.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://n8n:5678/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Allow large file uploads or requests (adjust as needed)
    client_max_body_size 50M;

    # Logging
    error_log  /var/log/nginx/n8n_error.log;
    access_log /var/log/nginx/n8n_access.log;
}

# Docker Registry
server {
    listen 443 ssl;
    server_name registry.alanhoangnguyen.com;

    ssl_certificate /etc/letsencrypt/live/registry.alanhoangnguyen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registry.alanhoangnguyen.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Increase client max body size for large image pushes
    client_max_body_size 5G;

    location / {
        proxy_pass http://docker-registry:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Registry specific headers
        proxy_set_header Docker-Content-Digest $upstream_http_docker_content_digest;
        proxy_set_header Docker-Distribution-Api-Version $upstream_http_docker_distribution_api_version;

        # Extended timeouts for large image pushes/pulls (30 minutes)
        proxy_connect_timeout 1800;
        proxy_send_timeout 1800;
        proxy_read_timeout 1800;

        # Disable proxy buffering for large transfers
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Logging
    error_log  /var/log/nginx/registry_error.log;
    access_log /var/log/nginx/registry_access.log;
}

