#         return 200 '{"resource":"https://alanhoangnguyen.com/mcp","authorization_servers":["https://auth.alanhoangnguyen.com/realms/mcp"],"scopes_supported":["inventory:read","inventory:write"],"bearer_methods_supported":["header"],"resource_documentation":"https://alanhoangnguyen.com/docs/mcp"}';
#         add_header Cache-Control "public, max-age=3600";
