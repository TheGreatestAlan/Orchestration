services:
  organizerserver:
    image: registry.alanhoangnguyen.com/admin/organizerserver:${ORGANIZER_VERSION:-latest}
    restart: unless-stopped
    environment:
      - BASE_GIT_REPO_LOCATION=$BASE_GIT_REPO_LOCATION_CONTAINER
      - GIT_TOKEN=$GIT_TOKEN
      - GIT_USER=$GIT_USER
      - GIT_SYNC_ENABLED=$GIT_SYNC_ENABLED
      - NOTE_BASE_LOCATION=$NOTE_BASE_LOCATION_CONTAINER
      - OBSIDIAN_VAULT_REPO_LOCATION=$OBSIDIAN_VAULT_REPO_LOCATION_CONTAINER
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=3000
      - MCP_API_KEY=${MCP_TODO_API_KEY}
      - MCP_DNS_REBINDING_PROTECTION=$MCP_DNS_REBINDING_PROTECTION
      - MCP_ALLOWED_HOSTS=$MCP_ALLOWED_HOSTS
      - MCP_ALLOWED_ORIGINS=$MCP_ALLOWED_ORIGINS
      - MCP_OAUTH_ENABLED=$MCP_OAUTH_ENABLED
      - MCP_OAUTH_ISSUER=$MCP_OAUTH_ISSUER
      - MCP_OAUTH_AUDIENCE=$MCP_OAUTH_AUDIENCE
      - MCP_OAUTH_SCOPES=$MCP_OAUTH_SCOPES
      - INVENTORY_API_BASE_URL=http://localhost:8080
    volumes:
      - $OBSIDIAN_VAULT_LOCATION_HOST:$OBSIDIAN_VAULT_LOCATION_CONTAINER
      - ~/.ssh:/root/.ssh:ro
    networks:
      - obsidian_network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: conversationalist_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - obsidian_network

  conversationalist:
    image: registry.alanhoangnguyen.com/admin/conversationalist:${CONVERSATIONALIST_VERSION:-latest}
    restart: unless-stopped
    environment:
      - FIREWORKS_API_KEY=$FIREWORKS_API_KEY
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-gunicorn}
      - REST_PORT=${REST_PORT:-8080}
      - MAX_CONTEXT_LENGTH=${MAX_CONTEXT_LENGTH:-200}
      - REDIS_URL=redis://redis:6379/0
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-eventlet}
      - GUNICORN_LOG_LEVEL=${GUNICORN_LOG_LEVEL:-info}
      - GUNICORN_MAX_REQUESTS=${GUNICORN_MAX_REQUESTS:-1000}
      - GUNICORN_MAX_REQUESTS_JITTER=${GUNICORN_MAX_REQUESTS_JITTER:-100}
      - GUNICORN_KEEPALIVE=${GUNICORN_KEEPALIVE:-5}
      - GUNICORN_GRACEFUL_TIMEOUT=${GUNICORN_GRACEFUL_TIMEOUT:-30}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis
    networks:
      - obsidian_network

  flofluent:
    image: registry.alanhoangnguyen.com/admin/flofluent-monolithic:${FLOFLUENT_VERSION:-latest}
    restart: unless-stopped
    environment:
      - CONVERSATIONALIST_BASE_URL=http://conversationalist:8080
      - PUBLIC_CONVERSATIONALIST_BASE_URL=http://conversationalist:8080
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY}
      - CONVERSATIONALIST_BASE_URL=http://conversationalist:8080
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      - EMAIL_PROVIDER=sendgrid
      - EMAIL_FROM_ADDRESS=noreply@flofluent.com
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - PUBLIC_ENABLE_CHAT_HISTORY=${PUBLIC_ENABLE_CHAT_HISTORY:-true}
    volumes:
      - ./dev/open-webui:/app/backend/data
    networks:
      - obsidian_network

  nginx_proxy_manager:
    image: "happydance/nginx:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    networks:
      - obsidian_network
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      - AGENT_SERVER_PORT=$AGENT_SERVER_REST_PORT
    volumes:
      - ./custom_server.conf:/etc/nginx/conf.d/custom_server.conf
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
      - ./npm/log:/var/log/nginx
      - ./dev/.htpasswd:/etc/nginx/.htpasswd
      - ./webroot:/var/www/certbot
    depends_on:
      - certbot

  docker-registry:
    image: registry:2
    container_name: docker_registry
    restart: unless-stopped
    environment:
      - REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/var/lib/registry
      - REGISTRY_AUTH=htpasswd
      - REGISTRY_AUTH_HTPASSWD_REALM=Registry Realm
      - REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd
      - REGISTRY_HTTP_ADDR=0.0.0.0:5000
      - REGISTRY_STORAGE_DELETE_ENABLED=true
      - REGISTRY_LOG_LEVEL=info
      - REGISTRY_HTTP_DEBUG_ADDR=0.0.0.0:5001
      - REGISTRY_HTTP_HTTP2_DISABLED=true
    volumes:
      - ./registry/data:/var/lib/registry
      - ./registry/auth:/auth
      - ./registry/config.yml:/etc/docker/registry/config.yml:ro
    networks:
      - obsidian_network

  pypi-server:
    image: pypiserver/pypiserver:latest
    container_name: pypi-server
    restart: unless-stopped
    volumes:
      - ./pypi-server/packages:/data/packages
      - ./pypi-server/auth:/data/auth
    command: run -p 8080 -a update -P /data/auth/.htpasswd /data/packages
    networks:
      - obsidian_network

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./npm/letsencrypt:/etc/letsencrypt
      - ./webroot:/var/www/certbot
      - ./certbot-scripts:/scripts
    environment:
      - CERTBOT_EMAIL=$CERTBOT_EMAIL
      - DOMAINS=$CERTBOT_DOMAINS
    entrypoint: /bin/sh
    command: >
      -c "
      trap exit TERM;
      while :; do
        sleep 12h & wait;
        /scripts/renew-certs.sh;
      done"
    restart: unless-stopped
    networks:
      - obsidian_network

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard_server
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
      - SERVERURL=${SERVERURL}
      - SERVERPORT=${SERVERPORT:-51820}
      - PEERS=${PEERS:-1}
      - PEERDNS=${PEERDNS:-auto}
      - INTERNAL_SUBNET=${INTERNAL_SUBNET}
    volumes:
      - ./wireguard-config:/config
      - /lib/modules:/lib/modules
    networks:
      - obsidian_network
    ports:
      - "${SERVERPORT:-51820}:${SERVERPORT:-51820}/udp"
    restart: unless-stopped

  scheduler:
    image: happydance/scheduler:latest
    container_name: scheduler
    environment:
      - REST_ADDRESS=${SCHEDULER_REST_ADDRESS:-0.0.0.0}
      - REST_PORT=${SCHEDULER_PORT:-8080}
      - HELPER_URL=http://helper:8080
      - SCHEDULER_STORAGE_PATH=/app/data/scheduler_tasks.json
    volumes:
      - ./scheduler_data:/app/data
    networks:
      - obsidian_network
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: n8n
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL}
    networks:
      - obsidian_network
    restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    volumes:
      - ./vaultwarden/vw-data:/data
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=true
      - SHOW_PASSWORD_HINT=false
      - WEB_VAULT_ENABLED=true
      - LOG_LEVEL=info
    networks:
      - obsidian_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ./keycloak/db-data:/var/lib/postgresql/data
    networks:
      - obsidian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command:
      - start
      - --db=postgres
      - --features=token-exchange,admin-fine-grained-authz
    environment:
      - KC_HOSTNAME=auth.alanhoangnguyen.com
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_PROXY_HEADERS=xforwarded
      - KC_DB=postgres
      - KC_DB_URL_HOST=keycloak-db
      - KC_DB_URL_PORT=5432
      - KC_DB_URL_DATABASE=keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    volumes:
      - ./keycloak/data:/opt/keycloak/data
    networks:
      - obsidian_network
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo 'OK' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  jwt-validator:
    image: registry.alanhoangnguyen.com/admin/jwt-validator:${JWT_VALIDATOR_VERSION:-latest}
    container_name: jwt_validator
    restart: unless-stopped
    environment:
      - PORT=${JWT_VALIDATOR_PORT}
      - KEYCLOAK_ISSUER=https://auth.alanhoangnguyen.com/realms/mcp
      - KEYCLOAK_JWKS_URI=https://auth.alanhoangnguyen.com/realms/mcp/protocol/openid-connect/certs
      - MCP_BACKEND_URL=http://organizerserver:3000
      - MCP_BACKEND_OBSIDIAN_URL=http://mcp-obsidian:3000
      - EXPECTED_AUDIENCE=https://alanhoangnguyen.com/mcp
      - REQUIRED_SCOPES=email,profile
      - JWKS_CACHE_TTL=${JWKS_CACHE_TTL_SECONDS}
      - LOG_LEVEL=${JWT_VALIDATION_LOG_LEVEL}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_BACKEND_DAYPLANNER_URL=http://dayplanner-mcp:3000
      - MCP_BACKEND_DAYPLANNER_API_KEY=${MCP_TODO_API_KEY}
      - MCP_BACKEND_OBSIDIAN_API_KEY=${MCP_OBSIDIAN_API_KEY}
      - MCP_BACKEND_TODOS_URL=http://todo-infrastructure:3000
      - MCP_BACKEND_TODOS_API_KEY=${MCP_TODO_API_KEY}
    networks:
      - obsidian_network
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${JWT_VALIDATOR_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-obsidian:
    image: registry.alanhoangnguyen.com/admin/mcp-obsidian:${MCP_OBSIDIAN_VERSION:-latest}
    container_name: mcp-obsidian
    restart: unless-stopped
    command: ["node", "src/index.js", "/obsidian"]
    environment:
      - PORT=3000
      - ALLOWED_ORIGINS=*
      - MCP_API_KEY=${MCP_OBSIDIAN_API_KEY}
    volumes:
      - ${OBSIDIAN_VAULT_LOCATION_HOST}:${OBSIDIAN_VAULT_LOCATION_CONTAINER}
    networks:
      - obsidian_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  todo-infrastructure:
    image: registry.alanhoangnguyen.com/admin/todo-infrastructure:${TODO_INFRA_VERSION:-latest}
    container_name: todo-infrastructure
    ports:
      - "3002:3000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${TODO_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@todo-postgres:5432/todos}
      - DATABASE_URL_SYNC=${TODO_DATABASE_URL_SYNC:-postgresql://postgres:postgres@todo-postgres:5432/todos}
      - LOG_LEVEL=${TODO_LOG_LEVEL:-INFO}
      - PORT=3001
      - MCP_PORT=3000
      - MCP_API_KEY=${MCP_TODO_API_KEY}
    volumes:
      - ./todo-infra-data/config:/app/config
      - ./todo-infra-data/logs:/app/logs
    networks:
      - obsidian_network
    depends_on:
      - todo-postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  todo-postgres:
    image: postgres:15
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TODO_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${TODO_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TODO_POSTGRES_DB:-todos}
    volumes:
      - ./todo-postgres-data:/var/lib/postgresql/data
    networks:
      - obsidian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TODO_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5



  dayplanner-mcp:
    image: registry.alanhoangnguyen.com/admin/dayplanner-mcp:${DAYPLANNER_VERSION:-latest}
    container_name: dayplanner-mcp
    restart: unless-stopped
    environment:
      - MCP_PORT=3000
      - MCP_API_KEY=${MCP_TODO_API_KEY}
      - NOTES_MCP_URL=http://mcp-obsidian:3000/mcp
      - NOTES_MCP_API_KEY=${MCP_OBSIDIAN_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./dayplanner-data/logs:/app/logs
    networks:
      - obsidian_network
    stdin_open: true
    tty: true


  open-webui:
    image: registry.alanhoangnguyen.com/admin/open-webui:${OPENWEBUI_VERSION:-latest}
    container_name: open-webui
    ports:
      - "8089:8080"
    restart: unless-stopped
    environment:
      # Security (REQUIRED)
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY}
      - CONVERSATIONALIST_BASE_URL=http://conversationalist:8080
      - WEBUI_AUTH=${WEBUI_AUTH:-True}
      - NO_AUTH_ADMIN_EMAIL=${NO_AUTH_ADMIN_EMAIL:-admin@localhost}
      - NO_AUTH_ADMIN_PASSWORD=${NO_AUTH_ADMIN_PASSWORD}

      # Fireworks AI Configuration
      - OPENAI_API_BASE_URLS=https://api.fireworks.ai/inference/v1
      - OPENAI_API_KEYS=${FIREWORKS_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-accounts/fireworks/models/kimi-k2-instruct-0905}

      # MCP Server Configuration
      - TOOL_SERVER_CONNECTIONS=${TOOL_SERVER_CONNECTIONS:-[]}

      # General Settings
      - ENABLE_SIGNUP=False
      - DEFAULT_LOCALE=en-US
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-*}

      # Use existing infrastructure

    volumes:
      - ./open-webui-data:/app/backend/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - obsidian_network


networks:
  obsidian_network:

volumes:
  redis_data:
